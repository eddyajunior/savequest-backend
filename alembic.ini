# Configuração principal do Alembic.

[alembic]

# Pasta onde estão o env.py e as migrations.
script_location = %(here)s/migrations
# Adiciona a raiz do projeto ao Python Path.
prepend_sys_path = .
# Separador utilizado em listas de caminhos.
path_separator = os
# Fuso horário utilizado nos arquivos de migration.
# Deixe vazio para usar o horário local.
timezone = UTC

# Limite máximo de caracteres do slug no nome da migration.
truncate_slug_length = 40

# Executa o ambiente durante o comando revision,
# mesmo quando --autogenerate não for informado.
revision_environment = false

# Permite localizar arquivos .pyc e .pyo sem o arquivo .py original.
sourceless = false

# Diretórios de versões das migrations.
# O padrão é alembic/versions.
version_locations = %(here)s/migrations/versions

# Define o formato do nome dos arquivos de migration.
file_template = %%(rev)s_%%(slug)s

# Codificação utilizada na criação dos arquivos de migration.
output_encoding = utf-8

# URL de fallback.
#
# A conexão real com o Neon deve ser carregada pelo alembic/env.py
# usando DATABASE_URL. Não coloque senha real neste arquivo.
# sqlalchemy.url = postgresql+psycopg://user:password@localhost/database
sqlalchemy.url =


[post_write_hooks]

# Hooks opcionais executados depois da criação de uma migration.
# Por enquanto, não há nenhum configurado.


[loggers]

keys = root,sqlalchemy,alembic


[handlers]

keys = console


[formatters]

keys = generic


[logger_root]

level = WARN
handlers = console
qualname =


[logger_sqlalchemy]

level = WARN
handlers =
qualname = sqlalchemy.engine


[logger_alembic]

level = INFO
handlers =
qualname = alembic


[handler_console]

class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]

format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S