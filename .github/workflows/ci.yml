name: CI - SaveQue$t API

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: savequest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d savequest_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/savequest_test
      DATABASE_MIGRATION_URL: postgresql+psycopg://postgres:postgres@localhost:5432/savequest_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Mypy
        run: mypy app tests

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest -v

      - name: Run dependency audit
        run: pip-audit -r requirements.txt
                
      - name: Run pre-commit
        run: pre-commit run --all-files

